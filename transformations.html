    <style>
      .ball {
        margin-top: 50px;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: jump 0.35s ease-out infinite alternate;
        background: linear-gradient(to bottom, #6025f5 0%, #ff5555 100%);
      }
      @keyframes jump {
        from {
          transform: translateY(0px) rotate(0deg) scale(1, 1);
          opacity: 1;
        }
        to {
          transform: translateY(-50px) rotate(720deg) scale(0.8, 0.8);
          opacity: 0.8;
        }
      }
    </style>
